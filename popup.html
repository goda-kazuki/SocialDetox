<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #e94560;
    }

    /* 入力エリア */
    .add-form {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .add-form input {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid #333;
      border-radius: 4px;
      background: #16213e;
      color: #e0e0e0;
      font-size: 13px;
    }
    .add-form input::placeholder { color: #666; }
    .add-form button {
      padding: 6px 12px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .add-form button:hover { background: #c73652; }

    /* サイトリスト */
    .site-list {
      list-style: none;
      max-height: 280px;
      overflow-y: auto;
    }
    .site-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      border-bottom: 1px solid #222;
      font-size: 13px;
    }
    .site-list li:last-child { border-bottom: none; }
    .site-list .domain { word-break: break-all; }
    .site-list .remove-btn {
      background: none;
      border: none;
      color: #e94560;
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
      flex-shrink: 0;
    }
    .site-list .remove-btn:hover { color: #ff6b81; }

    .empty {
      color: #666;
      font-size: 13px;
      text-align: center;
      padding: 12px 0;
    }
  </style>
</head>
<body>
  <h1>SocialDetox</h1>

  <div class="add-form">
    <input type="text" id="siteInput" placeholder="例: www.youtube.com">
    <button id="addBtn">追加</button>
  </div>

  <ul class="site-list" id="siteList"></ul>

  <script src="popup.js"></script>
</body>
</html>
